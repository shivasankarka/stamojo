[workspace]
authors = ["Yuhao Zhu (朱宇浩) <dr.yuhao.zhu@outlook.com>"]
channels = ["https://repo.prefix.dev/modular-community", "https://conda.modular.com/max-nightly", "https://conda.modular.com/max", "conda-forge"]
description = "A statistical computing library for Mojo, inspired by scipy.stats and statsmodels"
license = "Apache-2.0"
name = "stamojo"
platforms = ["osx-arm64", "linux-64"]
readme = "README.md"
version = "0.1.0"

[dependencies]
mojo = "==0.26.1"

# ── Feature: test (adds scipy for reference-value benchmarks) ────────────────
[feature.test.dependencies]
python = ">=3.13,<3.14"
scipy = ">=1.14"

[feature.test.tasks]
t = "clear && pixi run --environment test package && bash ./tests/test_all.sh"
test = "pixi run --environment test package && bash ./tests/test_all.sh"

[environments]
test = ["test"]

[tasks]
# format the code
format = "pixi run mojo format ./src && pixi run mojo format ./tests && pixi run mojo format ./examples"

# compile the package
p = "clear && pixi run package"
package = "pixi run format && pixi run package_stamojo"
package_stamojo = "pixi run mojo package src/stamojo && cp stamojo.mojopkg tests/ && rm stamojo.mojopkg"

# clean the package files in tests folder
c = "clear && pixi run clean"
clean = "rm -f tests/stamojo.mojopkg"

# doc
doc = "clear && pixi run mojo doc -o docs/doc.json --diagnose-missing-doc-strings --validate-doc-strings src/stamojo"
